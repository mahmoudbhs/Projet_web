<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion – AvisIA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeInUp 0.4s ease both; }
        input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 30px #1e293b inset !important;
            -webkit-text-fill-color: #f1f5f9 !important;
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950 flex items-center justify-center p-4">

    <!-- Déco arrière-plan -->
    <div class="pointer-events-none fixed inset-0 overflow-hidden">
        <div class="absolute -top-60 -right-60 w-[500px] h-[500px] bg-violet-700/15 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-60 -left-60 w-[500px] h-[500px] bg-violet-900/15 rounded-full blur-3xl"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-violet-800/5 rounded-full blur-3xl"></div>
    </div>

    <div class="relative w-full max-w-md fade-in">

        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-violet-500 to-violet-700 rounded-2xl mb-4 shadow-xl shadow-violet-600/30">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-white tracking-tight">AvisIA</h1>
            <p class="text-slate-400 mt-1 text-sm">Analyse intelligente des avis clients</p>
        </div>

        <!-- Carte -->
        <div class="bg-slate-800/60 backdrop-blur-md border border-slate-700/60 rounded-2xl p-8 shadow-2xl shadow-black/40">
            <h2 class="text-xl font-semibold text-white mb-6">Bon retour !</h2>

            <!-- Alerte erreur -->
            <div id="errorAlert" class="hidden mb-5 px-4 py-3 bg-red-500/10 border border-red-500/30 rounded-xl">
                <p class="text-red-400 text-sm flex items-center gap-2">
                    <svg class="w-4 h-4 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
                    </svg>
                    <span id="error"></span>
                </p>
            </div>

            <form id="loginForm" class="space-y-5">
                <!-- Email -->
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Adresse email</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                            </svg>
                        </div>
                        <input type="email" id="email" placeholder="vous@exemple.com" required autocomplete="email"
                            class="w-full bg-slate-900/60 border border-slate-600 rounded-xl pl-10 pr-4 py-3 text-slate-100 placeholder-slate-500
                                   focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-transparent transition-all">
                    </div>
                </div>

                <!-- Mot de passe -->
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Mot de passe</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                            </svg>
                        </div>
                        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password"
                            class="w-full bg-slate-900/60 border border-slate-600 rounded-xl pl-10 pr-4 py-3 text-slate-100 placeholder-slate-500
                                   focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-transparent transition-all">
                    </div>
                </div>

                <!-- Bouton -->
                <button type="submit" id="submitBtn"
                    class="w-full bg-gradient-to-r from-violet-600 to-violet-700 hover:from-violet-500 hover:to-violet-600
                           text-white font-semibold py-3 px-4 rounded-xl transition-all duration-200
                           shadow-lg shadow-violet-600/25 hover:shadow-violet-500/30 hover:-translate-y-0.5
                           flex items-center justify-center gap-2 mt-1 disabled:opacity-60 disabled:cursor-not-allowed disabled:transform-none">
                    <svg id="btnSpinner" class="hidden w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
                    </svg>
                    <span id="btnText">Se connecter</span>
                </button>
            </form>

            <p class="text-center text-slate-500 text-sm mt-6">
                Pas encore de compte ?
                <a href="/frontend/register.html" class="text-violet-400 hover:text-violet-300 font-medium transition-colors">Créer un compte</a>
            </p>
        </div>

        <p class="text-center text-slate-600 text-xs mt-6">
            Analyse propulsée par Llama 3 via GROQ
        </p>
    </div>

    <script src="/js/login.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard – AvisIA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeInUp 0.4s ease both; }
        .card-delay-1 { animation-delay: 0.05s; }
        .card-delay-2 { animation-delay: 0.1s; }
        .card-delay-3 { animation-delay: 0.15s; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 99px; }
    </style>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">

    <!-- Toast container -->
    <div id="toastContainer" class="fixed top-4 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <!-- Navbar -->
    <header class="sticky top-0 z-40 bg-slate-900/80 backdrop-blur-md border-b border-slate-800">
        <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="/frontend/reviews.html" class="flex items-center gap-2.5">
                <div class="w-8 h-8 bg-gradient-to-br from-violet-500 to-violet-700 rounded-lg flex items-center justify-center shadow-md shadow-violet-600/30">
                    <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                            d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                    </svg>
                </div>
                <span class="font-bold text-white text-lg">AvisIA</span>
            </a>

            <div class="flex items-center gap-3">
                <a href="/frontend/reviews.html"
                   class="flex items-center gap-1.5 text-slate-400 hover:text-violet-400 text-sm font-medium transition-colors px-3 py-1.5 rounded-lg hover:bg-violet-500/10">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                    </svg>
                    Avis
                </a>
                <button onclick="logoutStats()"
                    class="flex items-center gap-1.5 text-slate-400 hover:text-red-400 text-sm font-medium transition-colors px-2 py-1.5 rounded-lg hover:bg-red-500/10"
                    title="Déconnexion">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                    </svg>
                    <span class="hidden sm:inline">Déconnexion</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Contenu -->
    <main class="max-w-5xl mx-auto px-4 py-8 space-y-8">

        <!-- En-tête -->
        <div class="fade-in">
            <h1 class="text-2xl font-bold text-white">Dashboard</h1>
            <p class="text-slate-500 text-sm mt-1">Vue d'ensemble de l'analyse des avis</p>
        </div>

        <!-- Cartes KPI -->
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
            <!-- Positifs -->
            <div class="fade-in card-delay-1 bg-slate-900/80 border border-slate-800 rounded-2xl p-6 flex items-start gap-4 hover:border-emerald-500/30 transition-colors">
                <div class="w-12 h-12 rounded-xl bg-emerald-500/10 border border-emerald-500/20 flex items-center justify-center flex-shrink-0">
                    <svg class="w-6 h-6 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 10h4.764a2 2 0 011.789 2.894l-3.5 7A2 2 0 0115.263 21h-4.017c-.163 0-.326-.02-.485-.06L7 20m7-10V5a2 2 0 00-2-2h-.095c-.5 0-.905.405-.905.905 0 .714-.211 1.412-.608 2.006L7 11v9m7-10h-2M7 20H5a2 2 0 01-2-2v-6a2 2 0 012-2h2.5"/>
                    </svg>
                </div>
                <div>
                    <p class="text-slate-500 text-xs font-medium uppercase tracking-wide">Avis positifs</p>
                    <p id="positivePercent" class="text-3xl font-bold text-emerald-400 mt-1">–</p>
                    <div class="mt-2 h-1.5 w-24 bg-slate-800 rounded-full overflow-hidden">
                        <div id="positiveBar" class="h-full bg-emerald-500 rounded-full transition-all duration-700" style="width:0%"></div>
                    </div>
                </div>
            </div>

            <!-- Négatifs -->
            <div class="fade-in card-delay-2 bg-slate-900/80 border border-slate-800 rounded-2xl p-6 flex items-start gap-4 hover:border-red-500/30 transition-colors">
                <div class="w-12 h-12 rounded-xl bg-red-500/10 border border-red-500/20 flex items-center justify-center flex-shrink-0">
                    <svg class="w-6 h-6 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14H5.236a2 2 0 01-1.789-2.894l3.5-7A2 2 0 018.736 3h4.018a2 2 0 01.485.06l3.76.94m-7 10v5a2 2 0 002 2h.096c.5 0 .905-.405.905-.904 0-.715.211-1.413.608-2.008L17 13V4m-7 10h2m5-10h2a2 2 0 012 2v6a2 2 0 01-2 2h-2.5"/>
                    </svg>
                </div>
                <div>
                    <p class="text-slate-500 text-xs font-medium uppercase tracking-wide">Avis négatifs</p>
                    <p id="negativePercent" class="text-3xl font-bold text-red-400 mt-1">–</p>
                    <div class="mt-2 h-1.5 w-24 bg-slate-800 rounded-full overflow-hidden">
                        <div id="negativeBar" class="h-full bg-red-500 rounded-full transition-all duration-700" style="width:0%"></div>
                    </div>
                </div>
            </div>

            <!-- Score moyen -->
            <div class="fade-in card-delay-3 bg-slate-900/80 border border-slate-800 rounded-2xl p-6 flex items-start gap-4 hover:border-violet-500/30 transition-colors">
                <div class="w-12 h-12 rounded-xl bg-violet-500/10 border border-violet-500/20 flex items-center justify-center flex-shrink-0">
                    <svg class="w-6 h-6 text-violet-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/>
                    </svg>
                </div>
                <div>
                    <p class="text-slate-500 text-xs font-medium uppercase tracking-wide">Score moyen IA</p>
                    <p id="averageScore" class="text-3xl font-bold text-violet-400 mt-1">–</p>
                    <div class="mt-2 h-1.5 w-24 bg-slate-800 rounded-full overflow-hidden">
                        <div id="scoreBar" class="h-full bg-violet-500 rounded-full transition-all duration-700" style="width:0%"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Graphiques -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- Donut sentiment -->
            <div class="fade-in bg-slate-900/80 border border-slate-800 rounded-2xl p-6">
                <h3 class="text-sm font-semibold text-slate-300 mb-5">Répartition des sentiments</h3>
                <div class="flex items-center justify-center">
                    <div class="relative w-52 h-52">
                        <canvas id="sentimentChart"></canvas>
                        <div id="sentimentCenter" class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                            <span class="text-3xl font-bold text-white" id="sentimentCenterValue">–</span>
                            <span class="text-xs text-slate-500">positifs</span>
                        </div>
                    </div>
                </div>
                <!-- Légende -->
                <div class="flex justify-center gap-4 mt-4">
                    <span class="flex items-center gap-1.5 text-xs text-slate-400">
                        <span class="w-2.5 h-2.5 rounded-full bg-emerald-500 inline-block"></span>Positif
                    </span>
                    <span class="flex items-center gap-1.5 text-xs text-slate-400">
                        <span class="w-2.5 h-2.5 rounded-full bg-slate-500 inline-block"></span>Neutre
                    </span>
                    <span class="flex items-center gap-1.5 text-xs text-slate-400">
                        <span class="w-2.5 h-2.5 rounded-full bg-red-500 inline-block"></span>Négatif
                    </span>
                </div>
            </div>

            <!-- Bar chart top topics -->
            <div class="fade-in bg-slate-900/80 border border-slate-800 rounded-2xl p-6">
                <h3 class="text-sm font-semibold text-slate-300 mb-5">Top thèmes détectés</h3>
                <div class="h-52 flex items-end">
                    <canvas id="topicsChart" class="w-full"></canvas>
                </div>
                <!-- Liste fallback -->
                <ul id="topTopics" class="hidden mt-4 space-y-2"></ul>
            </div>
        </div>

        <!-- Avis récents -->
        <div class="fade-in">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-base font-semibold text-slate-300">Avis récents</h3>
                <a href="/frontend/reviews.html" class="text-xs text-violet-400 hover:text-violet-300 transition-colors">Voir tous les avis →</a>
            </div>
            <div id="recentReviews" class="space-y-3">
                <div class="flex items-center justify-center py-12">
                    <svg class="w-7 h-7 text-violet-500 animate-spin" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
                    </svg>
                </div>
            </div>
        </div>
    </main>

    <script src="/js/stats.js"></script>
</body>
</html>
